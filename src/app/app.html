<main class="flex-1 h-100 flex items-center justify-center px-8 pb-10" style="position:relative;z-index:1">
    <!-- ════════════════ IDLE ════════════════ -->
    @if (timer.state() === 'idle') {
      <div class="animate-in flex flex-col items-center gap-6 text-center">
        <!-- Ring with play button in center -->
        <div style="display:grid; width:360px; height:360px; flex-shrink:0">
          <svg style="grid-area:1/1; display:block" width="360" height="360">
            <g transform="rotate(-90, 180, 180)">
              <g transform="rotate(0, 180, 180)">
                <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                  stroke="rgba(16,185,129,.12)" [attr.stroke-width]="14"
                  [attr.stroke-dasharray]="segLen + ' ' + ringC"
                  stroke-linecap="butt"/>
              </g>
              <g transform="rotate(120, 180, 180)">
                <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                  stroke="rgba(34,197,94,.12)" [attr.stroke-width]="14"
                  [attr.stroke-dasharray]="segLen + ' ' + ringC"
                  stroke-linecap="butt"/>
              </g>
              <g transform="rotate(240, 180, 180)">
                <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                  stroke="rgba(20,184,166,.12)" [attr.stroke-width]="14"
                  [attr.stroke-dasharray]="segLen + ' ' + ringC"
                  stroke-linecap="butt"/>
              </g>
            </g>
          </svg>

          <!-- Play button in center -->
          <div style="grid-area:1/1; display:flex; align-items:center; justify-content:center">
            <button (click)="timer.start()" class="play-btn">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="#10b981">
                <polygon points="6,3 20,12 6,21"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    }


    <!-- ════════════════ SESSION ════════════════ -->
    @if (timer.state() === 'session') {
      <div class="animate-in w-full h-full flex items-center justify-center">

        <!-- Center: segmented ring + session timer -->
        <div class="flex flex-col items-center gap-5 select-none">
          <!-- Ring SVG — CSS Grid overlay (SVG + timer in same cell) -->
          <div style="display:grid; width:360px; height:360px; flex-shrink:0">
            <svg style="grid-area:1/1; display:block" width="360" height="360">
              <defs>
                <!-- Glow filters per segment colour -->
                <filter id="glow-s0" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="5" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="glow-s1" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="5" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="glow-s2" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="5" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>

              <!--
                Outer <g> rotates coordinate system so 0° = 12 o'clock.
                Each sub-<g> is rotated by 0°/120°/240° to place each segment.
                stroke-dasharray="segLen C" draws only one segment at a time.
              -->
              <g transform="rotate(-90, 180, 180)">

                <!-- Segment 0 — Siedzenie (emerald) --> 🧍 Stanie
                <g transform="rotate(0, 180, 180)">
                  <!-- track -->
                  <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                    stroke="rgba(16,185,129,.12)" [attr.stroke-width]="14"
                    [attr.stroke-dasharray]="segLen + ' ' + ringC"
                    stroke-linecap="butt"/>
                  <!-- progress -->
                  <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                    stroke="#10b981" [attr.stroke-width]="14"
                    [attr.stroke-dasharray]="segLen + ' ' + ringC"
                    [attr.stroke-dashoffset]="subOffset(0)"
                    [attr.filter]="timer.currentSubSession() === 1 ? 'url(#glow-s0)' : ''"
                    stroke-linecap="round"
                    class="transition-all duration-1000"/>
                </g>

                <!-- Segment 1 — Stanie (bright green) -->
                <g transform="rotate(120, 180, 180)">
                  <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                    stroke="rgba(34,197,94,.12)" [attr.stroke-width]="14"
                    [attr.stroke-dasharray]="segLen + ' ' + ringC"
                    stroke-linecap="butt"/>
                  <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                    stroke="#22c55e" [attr.stroke-width]="14"
                    [attr.stroke-dasharray]="segLen + ' ' + ringC"
                    [attr.stroke-dashoffset]="subOffset(1)"
                    [attr.filter]="timer.currentSubSession() === 2 ? 'url(#glow-s1)' : ''"
                    stroke-linecap="round"
                    class="transition-all duration-1000"/>
                </g>

                <!-- Segment 2 — Piłka (teal) -->
                <g transform="rotate(240, 180, 180)">
                  <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                    stroke="rgba(20,184,166,.12)" [attr.stroke-width]="14"
                    [attr.stroke-dasharray]="segLen + ' ' + ringC"
                    stroke-linecap="butt"/>
                  <circle cx="180" cy="180" [attr.r]="RING_R" fill="none"
                    stroke="#14b8a6" [attr.stroke-width]="14"
                    [attr.stroke-dasharray]="segLen + ' ' + ringC"
                    [attr.stroke-dashoffset]="subOffset(2)"
                    [attr.filter]="timer.currentSubSession() === 3 ? 'url(#glow-s2)' : ''"
                    stroke-linecap="round"
                    class="transition-all duration-1000"/>
                </g>

              </g>
            </svg>

            <!-- Session time in centre of ring -->
            <div style="grid-area:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px">
              <span class="font-black leading-none tracking-tight"
                    style="font-size:4.5rem; font-variant-numeric:tabular-nums">
                {{ formattedSessionTime }}
              </span>
              <span class="text-[10px] uppercase tracking-[.25em]"
                    style="color:rgba(255,255,255,.25)">sesja</span>
            </div>
          </div>

          <!-- Play / Pause -->
          <div class="mt-2">
            @if (timer.isRunning()) {
              <button (click)="timer.pause()" class="btn-primary px-14 py-4 text-base">
                ⏸&ensp;Pauza
              </button>
            } @else {
              <button (click)="timer.resume()" class="btn-primary px-14 py-4 text-base">
                ▶&ensp;Wznów
              </button>
            }
          </div>
        </div>
      </div>
    }


    <!-- ════════════════ BREAK ════════════════ -->
    @if (timer.state() === 'break') {
      <div class="animate-in w-full h-full flex items-center justify-center">

        <!-- Center: break timer -->
        <div class="flex flex-col items-center gap-2 select-none">
          <div class="animate-breathe text-5xl mb-4">{{ currentBreakData.icon }}</div>

          <div class="text-[10px] uppercase tracking-[.3em]" style="color:rgba(255,255,255,.3)">
            Przerwa
          </div>

          <div class="font-black leading-none tracking-tight mt-1"
               style="font-size: clamp(5rem, 13vw, 8rem); font-variant-numeric:tabular-nums"
               [class]="timer.currentBreakType() === 'meditation' ? 'text-teal' : 'text-amber'">
            {{ formattedTime }}
          </div>

          <div class="text-2xl font-bold mt-3"
               [class]="timer.currentBreakType() === 'meditation' ? 'text-teal' : 'text-amber'">
            {{ currentBreakData.label }}
          </div>
        </div>
      </div>
    }

  </main>
